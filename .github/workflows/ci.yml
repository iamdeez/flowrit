name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          AUTH_SECRET: test-secret-for-ci
          RESEND_API_KEY: re_test_key

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH_SECRET: test-secret-for-ci
          AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          RESEND_API_KEY: re_test_key
          RESEND_FROM_EMAIL: onboarding@resend.dev
          R2_ACCOUNT_ID: test
          R2_ACCESS_KEY_ID: test
          R2_SECRET_ACCESS_KEY: test
          R2_BUCKET_NAME: test
          R2_PUBLIC_URL: https://r2.example
          NEXT_PUBLIC_NICEPAY_CLIENT_ID: S2_test
          NICEPAY_SECRET_KEY: test
          CRON_SECRET: test
          WEBHOOK_SECRET: test
          HEALTHCHECK_TOKEN: test

  e2e:
    name: Playwright E2E readiness
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check Playwright configuration
        run: |
          if [ -f playwright.config.ts ]; then
            npx playwright test --list
          else
            echo "playwright.config.ts not found yet; T018 will enable E2E listing."
          fi
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'http://localhost:3000' }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
